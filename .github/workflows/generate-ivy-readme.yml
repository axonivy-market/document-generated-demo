name: Generate Axon Ivy README

on:
  workflow_dispatch:

permissions:
  contents: write      # Needed to create branches and commit
  pull-requests: write # Needed to create pull requests

jobs:
  generate-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create update branch from default branch
        run: |
          set -euo pipefail
          BASE="${{ github.event.repository.default_branch }}"
          BRANCH_NAME="update-readme-${{ github.run_id }}"
          echo "Creating branch $BRANCH_NAME from $BASE"
          # Fetch the base branch and create a new branch from it
          git fetch origin "$BASE"
          git checkout -b "$BRANCH_NAME" "origin/$BASE"
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git rev-parse --abbrev-ref HEAD
        shell: bash

      - name: Setup Node.js (for npm fallback)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Copilot CLI (official)
        run: |
          set -euo pipefail
          if command -v copilot >/dev/null 2>&1; then
            echo "copilot CLI already installed"
            exit 0
          fi

          echo "Installing Copilot CLI using the official install script..."
          # Official install script (installs to $HOME/.local by default)
          if curl -fsSL https://gh.io/copilot-install | bash; then
            echo "copilot install script completed"
          else
            echo "copilot install script failed or unavailable"
          fi

          # Ensure local bin is on PATH
          export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"

          if command -v copilot >/dev/null 2>&1; then
            echo "copilot is now available"
            exit 0
          fi

          echo "Attempting npm fallback (requires Node.js >= 22)..."
          if command -v npm >/dev/null 2>&1; then
            if npm install -g @github/copilot; then
              echo "installed copilot via npm"
            else
              echo "npm install fallback failed"
            fi
          else
            echo "npm not available for fallback"
          fi

          if command -v copilot >/dev/null 2>&1; then
            echo "copilot available after fallback"
            exit 0
          fi

          echo "copilot CLI not found. Provide binary on PATH or run this workflow on a runner with Copilot preinstalled."
          exit 1

      - name: Generate README
        run: |
          set -euo pipefail
          
          echo "=== Generating README using Copilot Agent ==="
          
          # Use Copilot to generate README by invoking the skill via prompt
          # Skills in Copilot are auto-discovered and referenced with /skillname in prompts
          
          if ! command -v copilot >/dev/null 2>&1; then
            echo "Error: copilot CLI not found; installation step should have installed it."
            exit 1
          fi
          
          # Create a prompt file that references the skill
          cat > /tmp/copilot-readme-prompt.txt << 'EOF'
          Use the /generate-ivy-readme skill to generate a comprehensive README.md for this Axon Ivy project.
          
          The skill should:
          1. Analyze the project structure in the current workspace
          2. Extract key features and documentation from the main module
          3. Create well-structured README sections (Title, Description, Demo, Setup)
          4. Write the generated README to README.md in the repository root
          
          Workspace path: ./
          EOF
          
          echo "Prompt:"
          cat /tmp/copilot-readme-prompt.txt
          echo ""
          echo "Invoking Copilot agent with /generate-ivy-readme skill..."
          
          # Execute copilot with the prompt (non-interactive mode for CI/CD)
          copilot < /tmp/copilot-readme-prompt.txt > /tmp/copilot-output.txt 2>&1 || {
            echo "⚠ Copilot agent execution returned non-zero exit code"
            echo "Output:"
            cat /tmp/copilot-output.txt
          }
          
          # Show the copilot output
          echo ""
          echo "=== Copilot Agent Output ==="
          cat /tmp/copilot-output.txt || true
          
          # Verify README.md was created
          echo ""
          if [ -f README.md ]; then
            echo "✓ README.md generated successfully"
            echo "File size: $(wc -c < README.md) bytes"
            head -20 README.md
          else
            echo "⚠ README.md not found after agent execution"
            echo "Listing current directory contents:"
            ls -la
            exit 1
          fi
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_FINE_GRAINED_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: generate README with Copilot skill"
          title: "chore: update README (generated)"
          body: "Automated README generated by Copilot skill '.github/skills/generate-ivy-readme'."
          base: ${{ github.event.repository.default_branch }}
          branch: "update-readme-${{ github.run_id }}"
