name: Generate Axon Ivy README

on:
  workflow_dispatch:
    inputs:
      user_github_token:
        description: 'Optional: provide a GitHub token to perform the PR (insecure when using UI)'
        required: false
        default: ''

jobs:
  generate-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create update branch from default branch
        run: |
          set -euo pipefail
          BASE="${{ github.event.repository.default_branch }}"
          BRANCH_NAME="update-readme-${{ github.run_id }}"
          echo "Creating branch $BRANCH_NAME from $BASE"
          # Fetch the base branch and create a new branch from it
          git fetch origin "$BASE"
          git checkout -b "$BRANCH_NAME" "origin/$BASE"
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git rev-parse --abbrev-ref HEAD
        shell: bash

      - name: Setup Node.js (for copilot CLI install)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Copilot CLI
        run: |
          set -euo pipefail
          if command -v copilot >/dev/null 2>&1; then
            echo "copilot CLI already installed"
            exit 0
          fi

          echo "Attempting to install Copilot CLI via gh extension (github/copilot-cli)..."

          # Ensure gh CLI is available
          if ! command -v gh >/dev/null 2>&1; then
            echo "gh CLI not found. Installing gh..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y gh
          else
            echo "gh CLI already installed"
          fi

          # Try installing the copilot CLI as a gh extension
          if gh extension install github/copilot-cli --yes; then
            echo "gh extension install succeeded"
          else
            echo "gh extension install failed or extension not available"
          fi

          # Add common extension/bin locations to PATH and check for copilot
          export PATH="$HOME/.local/bin:$PATH"

          if command -v copilot >/dev/null 2>&1; then
            echo "copilot installed"
            exit 0
          fi

          echo "copilot CLI not found after attempting gh extension install."
          echo "Please provide a copilot binary on PATH, install on a self-hosted runner, or update this step with your organization's install method."
          exit 1

      - name: Generate README
        run: |
          set -euo pipefail
          SKILL=".github/skills/generate-ivy-readme"
          echo "Generating README using skill $SKILL"
          if command -v copilot >/dev/null 2>&1; then
            # The skill itself is expected to write README.md into the working directory.
            copilot run --skill "$SKILL" --input '{"workspacePath":"."}' || true
          else
            echo "copilot CLI not found; installation step should have installed it."
            exit 1
          fi
        env:
          COPILOT_API_TOKEN: ${{ secrets.COPILOT_API_TOKEN }}

      # Create PR using a user-provided token if given. WARNING: passing a token
      # via workflow_dispatch is insecure (the input is visible in the run details).
      - name: Create Pull Request (using provided token)
        if: ${{ github.event.inputs.user_github_token != '' }}
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ github.event.inputs.user_github_token }}
          commit-message: "chore: generate README with Copilot skill"
          title: "chore: update README (generated)"
          body: "Automated README generated by Copilot skill '.github/skills/generate-ivy-readme'."
          base: ${{ github.event.repository.default_branch }}
          branch: "update-readme-${{ github.run_id }}"

      - name: Create Pull Request (using workflow token)
        if: ${{ github.event.inputs.user_github_token == '' }}
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: generate README with Copilot skill"
          title: "chore: update README (generated)"
          body: "Automated README generated by Copilot skill '.github/skills/generate-ivy-readme'."
          base: ${{ github.event.repository.default_branch }}
          branch: "update-readme-${{ github.run_id }}"
