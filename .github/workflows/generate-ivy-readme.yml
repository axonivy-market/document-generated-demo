name: Generate Axon Ivy README

on:
  workflow_dispatch:
    inputs:
      user_github_token:
        description: 'Optional: provide a GitHub token to perform the PR (insecure when using UI)'
        required: false
        default: ''

jobs:
  generate-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create update branch from default branch
        run: |
          set -euo pipefail
          BASE="${{ github.event.repository.default_branch }}"
          BRANCH_NAME="update-readme-${{ github.run_id }}"
          echo "Creating branch $BRANCH_NAME from $BASE"
          # Fetch the base branch and create a new branch from it
          git fetch origin "$BASE"
          git checkout -b "$BRANCH_NAME" "origin/$BASE"
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git rev-parse --abbrev-ref HEAD
        shell: bash

      - name: Setup Node.js (for npm fallback)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Copilot CLI (official)
        run: |
          set -euo pipefail
          if command -v copilot >/dev/null 2>&1; then
            echo "copilot CLI already installed"
            exit 0
          fi

          echo "Installing Copilot CLI using the official install script..."
          # Official install script (installs to $HOME/.local by default)
          if curl -fsSL https://gh.io/copilot-install | bash; then
            echo "copilot install script completed"
          else
            echo "copilot install script failed or unavailable"
          fi

          # Ensure local bin is on PATH
          export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"

          if command -v copilot >/dev/null 2>&1; then
            echo "copilot is now available"
            exit 0
          fi

          echo "Attempting npm fallback (requires Node.js >= 22)..."
          if command -v npm >/dev/null 2>&1; then
            if npm install -g @github/copilot; then
              echo "installed copilot via npm"
            else
              echo "npm install fallback failed"
            fi
          else
            echo "npm not available for fallback"
          fi

          if command -v copilot >/dev/null 2>&1; then
            echo "copilot available after fallback"
            exit 0
          fi

          echo "copilot CLI not found. Provide binary on PATH or run this workflow on a runner with Copilot preinstalled."
          exit 1

      - name: Generate README
        run: |
          set -euo pipefail
          SKILL=".github/skills/generate-ivy-readme"
          echo "Generating README using skill $SKILL"
          if command -v copilot >/dev/null 2>&1; then
            # The skill itself is expected to write README.md into the working directory.
            copilot run --skill "$SKILL" --input '{"workspacePath":"."}' || true
          else
            echo "copilot CLI not found; installation step should have installed it."
            exit 1
          fi
        env:
          COPILOT_API_TOKEN: ${{ secrets.COPILOT_API_TOKEN }}

      # Create PR using a user-provided token if given. WARNING: passing a token
      # via workflow_dispatch is insecure (the input is visible in the run details).
      - name: Create Pull Request (using provided token)
        if: ${{ github.event.inputs.user_github_token != '' }}
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ github.event.inputs.user_github_token }}
          commit-message: "chore: generate README with Copilot skill"
          title: "chore: update README (generated)"
          body: "Automated README generated by Copilot skill '.github/skills/generate-ivy-readme'."
          base: ${{ github.event.repository.default_branch }}
          branch: "update-readme-${{ github.run_id }}"

      - name: Create Pull Request (using workflow token)
        if: ${{ github.event.inputs.user_github_token == '' }}
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: generate README with Copilot skill"
          title: "chore: update README (generated)"
          body: "Automated README generated by Copilot skill '.github/skills/generate-ivy-readme'."
          base: ${{ github.event.repository.default_branch }}
          branch: "update-readme-${{ github.run_id }}"
