name: Generate Axon Ivy README

on:
  workflow_dispatch:
    inputs:
      user_github_token:
        description: 'Optional: provide a GitHub token to perform the PR (insecure when using UI)'
        required: false
        default: ''

jobs:
  generate-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create update branch from default branch
        run: |
          set -euo pipefail
          BASE="${{ github.event.repository.default_branch }}"
          BRANCH_NAME="update-readme-${{ github.run_id }}"
          echo "Creating branch $BRANCH_NAME from $BASE"
          # Fetch the base branch and create a new branch from it
          git fetch origin "$BASE"
          git checkout -b "$BRANCH_NAME" "origin/$BASE"
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git rev-parse --abbrev-ref HEAD
        shell: bash

      - name: Setup Node.js (for copilot CLI install)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Copilot CLI
        run: |
          set -euo pipefail
          if command -v copilot >/dev/null 2>&1; then
            echo "copilot CLI already installed"
            exit 0
          fi

          echo "Attempting to download Copilot CLI from GitHub releases..."
          REPO="github/copilot-cli"
          API_URL="https://api.github.com/repos/${REPO}/releases/latest"

          # Try to find a linux amd64 asset URL
          ASSET_URL=$(curl -sS "$API_URL" | grep 'browser_download_url' | grep -i 'linux' | grep -E 'amd64|x86_64' | head -n1 | cut -d '"' -f4 || true)

          if [ -n "$ASSET_URL" ]; then
            echo "Found asset: $ASSET_URL"
            mkdir -p /tmp/copilot_install
            curl -sSL "$ASSET_URL" -o /tmp/copilot_install/copilot_asset

            # Try to extract tar.gz or zip
            if file /tmp/copilot_install/copilot_asset | grep -q 'gzip compressed'; then
              tar -xzf /tmp/copilot_install/copilot_asset -C /tmp/copilot_install
            elif file /tmp/copilot_install/copilot_asset | grep -q 'Zip archive data'; then
              unzip -qq /tmp/copilot_install/copilot_asset -d /tmp/copilot_install
            fi

            EXE=$(find /tmp/copilot_install -type f -iname 'copilot*' -perm -u+x | head -n1 || true)
            if [ -z "$EXE" ]; then
              EXE=$(find /tmp/copilot_install -type f -iname 'copilot*' | head -n1 || true)
            fi

            if [ -n "$EXE" ]; then
              sudo mv "$EXE" /usr/local/bin/copilot
              sudo chmod +x /usr/local/bin/copilot
              echo "copilot installed to /usr/local/bin/copilot"
            else
              echo "No copilot executable found in release asset"
              exit 1
            fi
          else
            echo "No suitable release asset found. Attempting npm install as fallback..."
            if npm install -g @githubnext/copilot-cli; then
              echo "copilot installed via npm"
            else
              echo "copilot not available via npm. Please provide copilot binary on PATH or update this step."
              exit 1
            fi
          fi

      - name: Generate README
        run: |
          set -euo pipefail
          SKILL=".github/skills/generate-ivy-readme"
          echo "Generating README using skill $SKILL"
          if command -v copilot >/dev/null 2>&1; then
            # The skill itself is expected to write README.md into the working directory.
            copilot run --skill "$SKILL" --input '{"workspacePath":"."}' || true
          else
            echo "copilot CLI not found; installation step should have installed it."
            exit 1
          fi
        env:
          COPILOT_API_TOKEN: ${{ secrets.COPILOT_API_TOKEN }}

      # Create PR using a user-provided token if given. WARNING: passing a token
      # via workflow_dispatch is insecure (the input is visible in the run details).
      - name: Create Pull Request (using provided token)
        if: ${{ github.event.inputs.user_github_token != '' }}
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ github.event.inputs.user_github_token }}
          commit-message: "chore: generate README with Copilot skill"
          title: "chore: update README (generated)"
          body: "Automated README generated by Copilot skill '.github/skills/generate-ivy-readme'."
          base: ${{ github.event.repository.default_branch }}
          branch: "update-readme-${{ github.run_id }}"

      - name: Create Pull Request (using workflow token)
        if: ${{ github.event.inputs.user_github_token == '' }}
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: generate README with Copilot skill"
          title: "chore: update README (generated)"
          body: "Automated README generated by Copilot skill '.github/skills/generate-ivy-readme'."
          base: ${{ github.event.repository.default_branch }}
          branch: "update-readme-${{ github.run_id }}"
