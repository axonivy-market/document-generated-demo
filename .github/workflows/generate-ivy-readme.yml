name: Generate Axon Ivy README

on:
  workflow_dispatch:

permissions:
  contents: write      # Needed to create branches and commit
  pull-requests: write # Needed to create pull requests

jobs:
  generate-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create update branch from default branch
        run: |
          set -euo pipefail
          BASE="${{ github.event.repository.default_branch }}"
          BRANCH_NAME="update-readme-${{ github.run_id }}"
          echo "Creating branch $BRANCH_NAME from $BASE"
          # Fetch the base branch and create a new branch from it
          git fetch origin "$BASE"
          git checkout -b "$BRANCH_NAME" "origin/$BASE"
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git rev-parse --abbrev-ref HEAD
        shell: bash

      - name: Setup Node.js (for npm fallback)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Generate README
        run: |
          set -euo pipefail
          
          echo "=== Generating README using GitHub Copilot ==="
          
          if ! command -v gh >/dev/null 2>&1; then
            echo "Error: GitHub CLI not found"
            exit 1
          fi
          
          echo "GitHub CLI: $(gh --version)"
          
          # Create prompt file
          cat > /tmp/readme-prompt.txt << 'PROMPT_EOF'
          Use the /generate-ivy-readme skill to generate a README.md for this Axon Ivy project.
          PROMPT_EOF
          
          echo "Invoking Copilot with skill..."
          
          # Run copilot programmatically (non-interactive mode)
          # -p: prompt flag
          # --allow-tool='write': allow Copilot to write files
          # --allow-tool='shell(git:*)': allow git commands for context
          # --no-ask-user: no prompting (needed for automation)
          timeout 600 copilot -p "$(cat /tmp/readme-prompt.txt)" --allow-tool='write' --allow-tool='shell(git:*)' --no-ask-user > /tmp/copilot-output.txt 2>&1 || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              echo "⚠ Timeout after 600 seconds"
            else
              echo "⚠ Exit code: $EXIT_CODE"
            fi
          }
          
          echo ""
          echo "=== Output ==="
          cat /tmp/copilot-output.txt
          
          # Save output as README if it's markdown
          if [ -s /tmp/copilot-output.txt ] && grep -q "^#" /tmp/copilot-output.txt; then
            cp /tmp/copilot-output.txt README.md
            echo ""
            echo "✓ README.md created"
          elif [ -f README.md ]; then
            echo "✓ README.md exists"
          else
            echo "✗ README.md not created"
            ls -la
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_FINE_GRAINED_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.COPILOT_FINE_GRAINED_TOKEN }}
          commit-message: "chore: generate README with Copilot skill"
          title: "chore: update README (generated)"
          body: "Automated README generated by Copilot skill '.github/skills/generate-ivy-readme'."
          base: ${{ github.event.repository.default_branch }}
          branch: "update-readme-${{ github.run_id }}"
