name: Build & UI Screenshot

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 1. Download Designer (as required)
      - name: Download Ivy Designer
        run: |
          set -e
          curl -L -o ivy-designer.zip \
            https://download.axonivy.com/13.1.1/AxonIvyEngine13.1.1.2506271313_All_x64.zip

          unzip ivy-designer.zip

      # 2. Locate Designer directory
      - name: Locate Ivy Designer
        run: |
          echo "===== ROOT ====="
          ls -la

          DESIGNER_DIR=$(find . -type d -name "AxonIvyDesigner*" | head -n 1)

          if [ -z "$DESIGNER_DIR" ]; then
            echo "❌ Designer directory not found"
            exit 1
          fi

          echo "DESIGNER_DIR=$DESIGNER_DIR" >> $GITHUB_ENV
          echo "Designer found at: $DESIGNER_DIR"

      # 3. Locate embedded Engine inside Designer
      - name: Locate Embedded Engine
        run: |
          ENGINE_DIR=$(find "$DESIGNER_DIR" -type d -name "AxonIvyEngine*" | head -n 1)

          if [ -z "$ENGINE_DIR" ]; then
            echo "❌ Embedded Engine not found inside Designer"
            exit 1
          fi

          echo "ENGINE_DIR=$ENGINE_DIR" >> $GITHUB_ENV
          echo "Engine found at: $ENGINE_DIR"

      # 4. Validate binary
      - name: Validate Engine Binary
        run: |
          if [ ! -f "$ENGINE_DIR/bin/AxonIvyEngine" ]; then
            echo "❌ AxonIvyEngine binary not found"
            find "$ENGINE_DIR" -maxdepth 2
            exit 1
          fi

      # 5. Deploy project
      - name: Deploy Axon Ivy Project
        run: |
          set -e
          mkdir -p "$ENGINE_DIR/deploy/app"
          cp -r . "$ENGINE_DIR/deploy/app"

      # 6. Start Ivy Engine
      - name: Start Ivy Engine
        run: |
          set -e
          cd "$ENGINE_DIR/bin"

          chmod +x AxonIvyEngine

          ./AxonIvyEngine -startdaemon > ../../ivy.log 2>&1 &

          echo "Waiting for Ivy Engine..."

          for i in {1..60}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "✅ Ivy Engine is ready"
              exit 0
            fi
            sleep 2
          done

          echo "❌ Ivy Engine failed to start"
          echo "===== LOG ====="
          cat ../../ivy.log
          exit 1

      # 7. Check UI
      - name: Check UI
        run: |
          curl -I http://localhost:8080