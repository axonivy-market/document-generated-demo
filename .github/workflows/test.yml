name: Build & UI Screenshot

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Build main + demo → generate .iar
      - name: Build Axon Ivy Artifacts (.iar)
        run: |
          set -e

          mvn -B \
            -pl ibm-db2-luw-connector,ibm-db2-luw-connector-demo \
            -am clean install -DskipTests

          echo "===== GENERATED IAR FILES ====="
          find . -path "*/target/*.iar"

      # 4. Collect all IARs
      - name: Locate IARs
        run: |
          set -e

          MODULES=("ibm-db2-luw-connector" "ibm-db2-luw-connector-demo")

          IAR_FILES=""

          for MODULE in "${MODULES[@]}"; do
            echo "Searching in $MODULE..."

            FILES=$(find $MODULE/target -maxdepth 1 -name "*.iar" || true)

            if [ -z "$FILES" ]; then
              echo "⚠️ No .iar found in $MODULE"
              continue
            fi

            echo "Found in $MODULE:"
            echo "$FILES"

            IAR_FILES="$IAR_FILES $FILES"
          done

          if [ -z "$IAR_FILES" ]; then
            echo "❌ No .iar files found in any module"
            exit 1
          fi

          echo "IAR_FILES=$IAR_FILES" >> $GITHUB_ENV
          echo "Collected IARs: $IAR_FILES"

      # 5. Download Ivy Engine
      - name: Download Ivy Engine
        run: |
          set -e
          curl -L -o ivy-engine.zip \
            https://download.axonivy.com/13.1.1/AxonIvyEngine13.1.1.2506271313_All_x64.zip

          unzip ivy-engine.zip

      # 6. Detect Engine Root
      - name: Detect Engine Root
        run: |
          if [ -d "bin" ] && [ -f "bin/AxonIvyEngine" ]; then
            ENGINE_DIR=$(pwd)
          else
            ENGINE_DIR=$(find . -type d -name "AxonIvyEngine*" | head -n 1)
          fi

          if [ -z "$ENGINE_DIR" ]; then
            echo "❌ Engine directory not found"
            exit 1
          fi

          echo "ENGINE_DIR=$ENGINE_DIR" >> $GITHUB_ENV
          echo "Engine found at: $ENGINE_DIR"

      # 7. Validate Engine Binary
      - name: Validate Engine Binary
        run: |
          if [ ! -f "$ENGINE_DIR/bin/AxonIvyEngine" ]; then
            echo "❌ AxonIvyEngine binary not found"
            exit 1
          fi

      # 8. Deploy ALL IARs
      - name: Deploy IARs
        run: |
          set -e
          mkdir -p "$ENGINE_DIR/deploy"

          for IAR in $IAR_FILES; do
            echo "Deploying $IAR"
            cp "$IAR" "$ENGINE_DIR/deploy/"
          done

          echo "===== DEPLOY FOLDER ====="
          ls -la "$ENGINE_DIR/deploy"

      # 9. Start Ivy Engine
      - name: Start Ivy Engine
        run: |
          set -e
          cd "$ENGINE_DIR/bin"

          chmod +x AxonIvyEngine

          ./AxonIvyEngine -startdaemon > ../../ivy.log 2>&1 &

          echo "Waiting for Ivy Engine..."

          for i in {1..120}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "✅ Ivy Engine is ready"
              exit 0
            fi
            sleep 2
          done

          echo "❌ Engine failed to start"
          echo "===== LOG ====="
          cat ../../ivy.log
          exit 1

      # 10. Check UI
      - name: Check UI
        run: |
          curl -I http://localhost:8080

      # 11. Always print logs
      - name: Print Ivy Log
        if: always()
        run: |
          echo "===== IVY LOG ====="
          cat ivy.log || true