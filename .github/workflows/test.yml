name: Build & UI Screenshot

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java (required by Ivy)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Download Axon Ivy Engine
      - name: Download Ivy Engine
        run: |
          set -e
          curl -L -o ivy-engine.zip \
            https://download.axonivy.com/13.1.1/AxonIvyEngine13.1.1.2506271313_All_x64.zip

          unzip ivy-engine.zip

      # 4. Detect Engine directory (robust)
      - name: Detect Engine Root
        run: |
          echo "===== ROOT CONTENT ====="
          ls -la

          if [ -d "bin" ] && [ -f "bin/AxonIvyEngine" ]; then
            ENGINE_DIR=$(pwd)
          else
            ENGINE_DIR=$(find . -type d -name "AxonIvyEngine*" | head -n 1)
          fi

          if [ -z "$ENGINE_DIR" ]; then
            echo "❌ Engine directory not found"
            exit 1
          fi

          echo "ENGINE_DIR=$ENGINE_DIR" >> $GITHUB_ENV
          echo "Engine found at: $ENGINE_DIR"

      # 5. Validate binary
      - name: Validate Engine Binary
        run: |
          if [ ! -f "$ENGINE_DIR/bin/AxonIvyEngine" ]; then
            echo "❌ AxonIvyEngine binary not found"
            find "$ENGINE_DIR"
            exit 1
          fi

      # 6. Deploy ONLY your app module
      - name: Deploy Axon Ivy Project
        run: |
          set -e
          mkdir -p "$ENGINE_DIR/deploy/app"

          # Adjust this to your actual module
          cp -r ibm-db2-luw-connector "$ENGINE_DIR/deploy/app/"

      # 7. Start Ivy Engine
      - name: Start Ivy Engine
        run: |
          set -e
          cd "$ENGINE_DIR/bin"

          chmod +x AxonIvyEngine

          ./AxonIvyEngine -startdaemon > ../../ivy.log 2>&1 &

          echo "Waiting for Ivy Engine..."

          for i in {1..90}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "✅ Ivy Engine is ready"
              exit 0
            fi
            sleep 2
          done

          echo "❌ Ivy Engine failed to start"
          echo "===== LOG ====="
          cat ../../ivy.log
          exit 1

      # 8. Basic UI check
      - name: Check UI
        run: |
          echo "Checking HTTP response..."
          curl -I http://localhost:8080

      # 9. (Optional) Print log for debugging
      - name: Print Ivy Log (always)
        if: always()
        run: |
          echo "===== IVY LOG ====="
          cat ivy.log || true